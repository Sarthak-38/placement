<!DOCTYPE html>
<html>

<head>

    <title>Placement Predictor</title>

    <style>

        body{
            background-color: #f2f2f2;
            font-family: Arial;
            text-align: center;
            padding-top: 50px;
        }

        .container{
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

        h2{
            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Placement Prediction System</h1>

        <form action="/predict" method="post">

            <input type="text"
                   name="cgpa"
                   placeholder="Enter CGPA"
                   required>

            <input type="text"
                   name="internships"
                   placeholder="Enter Internships"
                   required>

            <button type="submit">Predict</button>

        </form>

        <h2>{{ prediction_text }}</h2>

    </div>

</body>

</html>
